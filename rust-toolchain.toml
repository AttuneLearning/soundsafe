[toolchain]
# Track current stable. Bumped to 1.95 on 2026-04-21 so current ecosystem
# tooling (cargo-nextest ≥0.9.133 requires ≥1.91, etc.) builds without
# per-tool version pins. Bump when a newer stable is convenient; don't
# hold back unless there's a specific reason.
channel = "1.95"
components = ["rustfmt", "clippy"]
targets = ["wasm32-unknown-unknown"]
profile = "minimal"
